<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
  body {
    background-color: #333;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
  }

  .container {
    text-align: center;
  }

  input[type="text"] {
    width: 200px;
    padding: 10px;
    margin-bottom: 10px;
  }

  button {
    background-color: black;
    color: white;
    border: none;
    padding: 10px 20px;
    cursor: pointer;
    font-size: 16px;
    width: 120px;
  }

  #randomString {
    margin-top: 20px;
  }
</style>
</head>
<body>

<div class="container">
  <label for="username"> </label>
  <input type="text" id="username" name="username" placeholder="彩蛋:Tack.io">
  <button id="loginBtn">Ready</button>
</div>

<div id="randomString"></div>

<script>
  // Function to generate a random string of alphanumeric characters
  function generateRandomString(length) {
    const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    let result = '';
    const charactersLength = characters.length;
    for (let i = 0; i < length; i++) {
      result += characters.charAt(Math.floor(Math.random() * charactersLength));
    }
    return result;
  }

  // Function to copy the text to clipboard
  function copyToClipboard(text) {
    const el = document.createElement('textarea');
    el.value = text;
    el.setAttribute('readonly', '');
    el.style.position = 'absolute';
    el.style.left = '-9999px';
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
  }

  // Attach event listener to the button
  document.getElementById('loginBtn').addEventListener('click', function() {
    const username = document.getElementById('username').value;
    if (username) {
      // Generate a random string
      const randomString = generateRandomString(11);

      // Display the random string
      document.getElementById('randomString').innerText = randomString;

      // Copy the random string to clipboard
      copyToClipboard(randomString);

      // Redirect the user
      window.location.href = 'https://hangymind.github.io/Hangy.io';
    } else {
      alert('Please enter a username');
    }
  });
</script>

</body>
</html>
