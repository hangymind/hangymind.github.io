<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>
<style>
  body {
    background-color: #333;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
  }

  .container {
    width: 300px;
    background-color: #fff;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.3);
  }

  .input-group {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
  }

  input[type="text"] {
    flex: 1;
    padding: 5px;
    border-radius: 5px 0 0 5px;
    border: none;
  }

  .button {
    width: 120px;
    height: 40px;
    background-color: #333;
    color: #fff;
    border: none;
    border-radius: 0 5px 5px 0;
    cursor: pointer;
  }

  .buttons-footer {
    display: flex;
    justify-content: space-around;
    width: 100%;
    margin-top: 20px;
  }

  .footer-button {
    width: 100px;
    height: 40px;
    background-color: #333;
    color: #fff;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    margin: 0 10px;
  }

  .random-string {
    margin-top: 10px;
    color: #fff;
  }
</style>
</head>
<body>

<div class="container">
  <div class="input-group">
    <input type="text" id="username" placeholder="Username">
    <button class="button" id="readyButton">Ready</button>
  </div>
</div>

<div class="buttons-footer">
  <button class="footer-button" onclick="window.location.href='Tack.io'">Tack.io</button>
  <button class="footer-button" onclick="window.location.href='hange'">泰拉瑞亚</button>
  <button class="footer-button" onclick="window.location.href='static'">闲人免进</button>
</div>

<div class="random-string" id="randomStringContainer"></div>

<script>
  // Generate a random 11-character alphanumeric string
  function generateRandomString() {
    let result = '';
    const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    const charactersLength = characters.length;
    for (let i = 0; i < 11; i++) {
      result += characters.charAt(Math.floor(Math.random() * charactersLength));
    }
    return result;
  }

  // Copy the random string to the clipboard
  function copyToClipboard(text) {
    const el = document.createElement('textarea');
    el.value = text;
    el.setAttribute('readonly', '');
    el.style.position = 'absolute';
    el.style.left = '-9999px';
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
  }

  // Display and copy the random string
  const randomString = generateRandomString();
  const randomStringContainer = document.getElementById('randomStringContainer');
  randomStringContainer.textContent = randomString;
  copyToClipboard(randomString);

  // Redirect to Hangy.io on button click
  document.getElementById('readyButton').addEventListener('click', function() {
    window.location.href = 'https://hangymind.github.io/Hangy.io';
  });
</script>

</body>
</html>
