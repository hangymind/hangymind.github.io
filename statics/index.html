<!DOCTYPE html>
<html>
<head>
    <title>彩蛋</title>
</head>
<body>
    <div id="myText">ok</div>

    <script>
        // 设置一个定时器，五秒后执行改变文字内容的函数
        setTimeout(function() {
            // 获取要更改内容的元素
            var textElement = document.getElementById("myText");
            // 更改元素的文本内容
            textElement.textContent = "看啥啊，static一堆代码你看得懂吗lololololol（这个游戏由Furika制作）";
        }, 5000); // 5000毫秒等于5秒
    </script>
</body>
</html>
