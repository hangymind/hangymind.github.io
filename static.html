<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>
<style>
  body {
    background-color: #333;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: Arial, sans-serif;
  }
  .login-container {
    background-color: #fff;
    padding: 20px;
    border-radius: 5px;
    width: 300px;
  }
  .login-container input[type="password"] {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 3px;
    border: 1px solid #ccc;
  }
  .login-container button {
    width: 100%;
    padding: 10px;
    background-color: #4CAF50;
    color: white;
    border: none;
    border-radius: 3px;
    cursor: pointer;
  }
  .login-container button:disabled {
    background-color: #ccc;
    cursor: not-allowed;
  }
  .success-message {
    margin-top: 10px;
    color: green;
    display: none;
  }
</style>
</head>
<body>

<div class="login-container">
  <input type="password" id="passwordInput" placeholder="password">
  <button id="loginButton" disabled>Login</button>
  <input type="text" id="secondInput" placeholder="UID" disabled>
  <div id="successMessage" class="success-message"></div>
</div>

<script>
  const passwordInput = document.getElementById('passwordInput');
  const loginButton = document.getElementById('loginButton');
  const secondInput = document.getElementById('secondInput');
  const successMessage = document.getElementById('successMessage');

  passwordInput.addEventListener('input', function() {
    if (this.value === 'mcyyds666') {
      loginButton.disabled = false;
      secondInput.disabled = false;
    } else {
      loginButton.disabled = true;
      secondInput.value = '';
      secondInput.disabled = true;
    }
  });

  loginButton.addEventListener('click', function() {
    if (secondInput.value.length === 11 && /^[a-zA-Z0-9]+$/.test(secondInput.value)) {
      successMessage.style.display = 'block';
      successMessage.textContent = '读取成功';
      window.location.href = 'https://hangymind.github.io/Hangy.io';
    } else {
      alert('enter uid');
      secondInput.value = '';
    }
  });
</script>

</body>
</html>
