<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 Not Found</title>
<style>
  body {
    background-color: #333;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding-top: 50px;
  }

  .error-message {
    font-size: 24px;
  }

  .button {
    display: inline-block;
    padding: 10px 20px;
    background-color: #4CAF50; /* Green */
    border: none;
    color: white;
    text-align: center;
    text-decoration: none;
    font-size: 16px;
    margin: 20px 0;
    cursor: pointer;
  }

  .button:hover {
    background-color: #45a049; /* Green hover */
  }
</style>
</head>
<body>

<div class="error-message">
  404
</div>

<button class="button" onclick="redirectToUrl()">Go to hangymind.github.io</button>

<script>
  function redirectToUrl() {
    window.location.href = 'http://hangymind.github.io/';
  }
</script>

</body>
</html>
